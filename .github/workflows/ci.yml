name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r cifra_app/requirements.txt pytest httpx

      - name: Testes unitários
        run: pytest cifra_app/tests/test_cifra.py -v

      - name: Testes de integração da API
        run: pytest cifra_app/tests/test_api.py -v